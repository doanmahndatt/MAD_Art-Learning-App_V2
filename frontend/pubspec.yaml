name: art_learn_app
description: Art learning and creative application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  intl: ^0.18.1
  cached_network_image: ^3.3.0
  shared_preferences: ^2.2.2
  image_picker: ^1.0.5
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  flutter_colorpicker: ^1.0.3
  dio: ^5.3.0
  provider: ^6.0.5
  flutter_secure_storage: ^9.0.0
